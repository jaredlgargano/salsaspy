name: Refresh Locations Database

on:
  schedule:
    # 11:00 UTC roughly corresponds to 6:00 AM EST (or 7am EDT). 
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Script
        run: npx tsx scripts/build_locations_csv.ts

      - name: Import to Database
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx tsx scripts/import_markets_to_d1.ts
          npx wrangler d1 execute scraper-db --remote --file=import_markets.sql

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add locations.csv
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update locations.csv daily refresh"
          git push
